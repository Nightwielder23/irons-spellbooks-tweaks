Config tweaks for Iron's Spells 'n Spellbooks. Modpack-maker focused. Adds TOML knobs for mana regen rate, starting mana on first join, global cooldown reduction, and a flag to fully disable passive mana regen. Soft dependency, mod loads without Iron's Spellbooks present and does nothing.
'''

